<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FINANZEN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard">
    <div class="container">
        <button id="logout-btn" class="logout-btn" onclick="logout()">Logout</button>

        <div class="header-section">
            <h1>FINANZEN</h1>
            <h2>Your Budget Dashboard</h2>
        </div>

        <div class="user-info">
            <h3>Welcome, <span id="user-name">User</span>!</h3>
        </div>

        <div class="budget-section">
            <div id="budget-setter" class="budget-card">
                <h3>Set Your Budget</h3>
                <div class="budget-controls">
                    <div class="form-group">
                        <label for="monthly-budget" class="budget-setter-labels">Budget Amount (₹)</label>
                        <input type="number" id="monthly-budget" min="1" class="form-control"
                            placeholder="Enter your budget amount">
                    </div>
                    <div class="form-group">
                        <label for="budget-period" class="budget-setter-labels">Budget Period</label>
                        <select id="budget-period" class="form-control">
                            <option value="monthly">Monthly</option>
                            <option value="weekly">Weekly</option>
                            <option value="yearly">Yearly</option>
                            <option value="custom">Custom Period</option>
                        </select>
                    </div>
                    <div id="custom-period-container" class="form-group hidden">
                        <label for="custom-period" class="budget-setter-labels">Custom Period (days)</label>
                        <input type="number" id="custom-period" min="1" class="form-control"
                            placeholder="Enter number of days">
                    </div>
                    <button id="set-budget" class="submit-btn">Set Budget</button>
                </div>
            </div>

            <div id="budget-overview" class="budget-card hidden" style="width: 100%; max-width: none !important; box-sizing: border-box;">
                <h3>Budget Overview</h3>
                <div id="budget-period-info" class="budget-period-info">
                </div>
                <div class="progress-container" style="width: 100%; max-width: none !important; box-sizing: border-box;">
                    <div class="progress-label">
                        <span>Budget Usage</span>
                        <span id="progress-percentage"></span>
                    </div>
                    <div class="progress-bar" style="width: 100% !important;">
                        <div id="progress-fill" class="progress-fill" style="width: 0%">
                            <span id="progress-text" class="progress-text"></span>
                        </div>
                    </div>
                </div>

                <div class="budget-stats">
                    <div class="budget-stat">
                        <div class="budget-stat-value">₹<span id="display-budget">0</span></div>
                        <div class="budget-stat-label">Budget</div>
                    </div>
                    <div class="budget-stat">
                        <div class="budget-stat-value">₹<span id="total-expenses">0</span></div>
                        <div class="budget-stat-label">Spent</div>
                    </div>
                    <div class="budget-stat">
                        <div class="budget-stat-value">₹<span id="remaining-budget">0</span></div>
                        <div class="budget-stat-label">Remaining</div>
                    </div>
                    <div class="budget-stat" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);">
                        <div class="budget-stat-value" style="color: #10b981;">₹<span id="vault-balance">0</span></div>
                        <div class="budget-stat-label" style="color: #10b981; font-weight: bold;">Savings Vault</div>
                    </div>
                </div>

                
                
                <div id="budget-action-buttons" style="display: flex; gap: 10px; width: 100%; margin-top: 20px;">
                    <button id="reset-budget-btn" class="reset-budget-btn" onclick="resetBudget()" style="flex: 1; margin-top: 0;">
                        Reset My Budget
                    </button>
                    <button id="history-btn" class="submit-btn" onclick="showPastBudgets()"
                        style="display: none; flex: 1; margin-top: 0; background-color: #314b6e; font-size: 16px !important;">
                        View Past Budgets
                    </button>
                </div>
                </div>
                <div id="bottom-widgets" class="hidden"
                    style="display: flex; flex-wrap: wrap; gap: 30px; margin-top: 40px; width: 100%; max-width: none !important; box-sizing: border-box;">
                
                    <div id="chart-card-container" class="budget-card"
                        style="flex: 1; min-width: 300px; margin: 0; box-sizing: border-box;">
                            <div id="chart-wrapper" class="chart-container" style="position: relative; height: 350px">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                
                    <div id="expense-list" class="budget-card"
                        style="flex: 1; min-width: 300px; margin: 0; max-height: 400px; overflow-y: auto; box-sizing: border-box;">
                        <h3>Your Expenses</h3>
                        <div id="expenses-container"></div>
                    </div>
                
                </div>
        <div id="expense-tracker" class="expense-form hidden" style="margin-top: 40px; width: 100%; max-width: none !important; box-sizing: border-box; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;">
            <h3>Add New Expense</h3>
            <form id="expense-form" class="inline-expense-form">
                <div class="form-group">
                    <label for="expense-amount">Amount (₹)</label>
                    <input type="number" id="expense-amount" min="1" class="form-control" placeholder="Amount" required>
                </div>
                <div class="form-group">
                    <label for="expense-category">Category</label>
                    <select id="expense-category" class="form-control" required>
                        <option value="">Select</option>
                        <option value="Food">Food</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="other-category-container" class="form-group hidden">
                    <label for="other-category">Specify Category</label>
                    <input type="text" id="other-category" class="form-control" placeholder="Category name">
                </div>
                <div class="form-group">
                    <label for="expense-description">Description</label>
                    <input type="text" id="expense-description" class="form-control" placeholder="Description">
                </div>
                <button type="submit" class="submit-btn">Add</button>
            </form>
        </div>

        
    </div>

    <script>
        const expenseForm = document.getElementById('expense-form');
        const expenseCategory = document.getElementById('expense-category');
        const otherCategoryContainer = document.getElementById('other-category-container');
        const budgetSetter = document.getElementById('budget-setter');
        const budgetOverview = document.getElementById('budget-overview');
        const expenseTracker = document.getElementById('expense-tracker');
        const expenseList = document.getElementById('expense-list');
        const bottomWidgets = document.getElementById('bottom-widgets');
        const budgetPeriod = document.getElementById('budget-period');
        const customPeriodContainer = document.getElementById('custom-period-container');

        const progressFill = document.getElementById('progress-fill');
        const progressPercentage = document.getElementById('progress-percentage');
        const progressText = document.getElementById('progress-text');
        const budgetPeriodInfo = document.getElementById('budget-period-info');

        const API_URL = 'https://finanzen-backend-5pqy.onrender.com/api';
        const token = localStorage.getItem('finanzenToken');
        let currentUser = localStorage.getItem('finanzenCurrentUser');
        let selectedCategoryFilter = null;
        let dashboardData = {
            name: currentUser || "User",
            budget: 0,
            budgetPeriod: 'monthly',
            customDays: null,
            expenses: [],
            savingsVault: 0
        };
        let expenseChartInstance = null;
        if (!token || !currentUser) {
            window.location.href = 'index.html';
        }
        document.addEventListener('DOMContentLoaded', function () {
            window.checkBudgetExpiration();
            document.getElementById('user-name').textContent = currentUser;
            fetchDashboardMetrics();
        });

        expenseForm.addEventListener('submit', addExpense);
        expenseCategory.addEventListener('change', toggleOtherCategory);
        budgetPeriod.addEventListener('change', toggleCustomPeriod);
        document.getElementById('set-budget').addEventListener('click', setBudget);

        async function fetchDashboardMetrics() {
                try {
                    const response = await fetch(`${API_URL}/dashboard`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const serverData = await response.json();

                        let safePeriod = serverData.budget_period || serverData.period_type || serverData.period || dashboardData.budgetPeriod || 'monthly';

                        dashboardData = {
                            name: serverData.name || currentUser,
                            hasActiveBudget: serverData.hasActiveBudget !== undefined ? serverData.hasActiveBudget : true,
                            budget: serverData.base_budget !== undefined ? serverData.base_budget : (serverData.budget || 0),
                            budgetPeriod: safePeriod.toLowerCase(),
                            customDays: serverData.custom_days || serverData.customDays || dashboardData.customDays || null,
                            expenses: serverData.expenses || [],
                            savings: serverData.savings,
                            rolloverMessage: serverData.rolloverMessage || ""
                        };
                        localStorage.setItem('cached_dashboard_metrics', JSON.stringify(dashboardData));
                        syncUIState();
                    } else if (response.status === 401) {
                        logout();
                    }
                } catch (error) {
                    console.error("Database connection fault:", error);
                    const cachedMetricsString = localStorage.getItem('cached_dashboard_metrics');

                    if (cachedMetricsString) {
                        console.log("Device is offline. Loading cached metrics safely.");

                        dashboardData = JSON.parse(cachedMetricsString);
                    } else {
                        dashboardData.hasActiveBudget = false;
                    }
                    syncUIState();
                }
            }
        function syncUIState() {
                document.getElementById('user-name').textContent = dashboardData.name || currentUser;
                checkPastSessions();
                if (dashboardData.hasActiveBudget) {
                    budgetSetter.style.display = 'none';
                    budgetOverview.classList.remove('hidden');
                    expenseTracker.classList.remove('hidden');
                    

                    if (!dashboardData.expenses || dashboardData.expenses.length === 0) {
                        bottomWidgets.classList.add('hidden');
                    } else {
                        bottomWidgets.classList.remove('hidden');
                    }

                    document.getElementById('display-budget').textContent = dashboardData.budget;
                    updateBudgetPeriodInfo();
                    loadExpenses();
                    updateBudgetSummary();
                    renderExpenseChart();
                } else {
                    budgetSetter.style.display = 'block';
                    budgetOverview.classList.add('hidden');
                    expenseTracker.classList.add('hidden');
                    bottomWidgets.classList.add('hidden');
                }
            }

        function toggleCustomPeriod() {
            if (budgetPeriod.value === 'custom') {
                customPeriodContainer.classList.remove('hidden');
            } else {
                customPeriodContainer.classList.add('hidden');
            }
        }

       async function setBudget() {
            const budget = parseInt(document.getElementById('monthly-budget').value);
            const period = budgetPeriod.value;
            let customDays = null;

            if (period === 'custom') {
                customDays = parseInt(document.getElementById('custom-period').value);
                if (isNaN(customDays) || customDays <= 0) {
                    Swal.fire({ icon: 'error', title: 'Oops...', text: 'Please enter a valid number of days for the custom period!' });
                    return;
                }
            }

            if (isNaN(budget) || budget <= 0) {
                Swal.fire({ icon: 'error', title: 'Invalid Budget', text: 'Please enter a valid budget amount!' });
                return;
            }

            try {
                const response = await fetch(`${API_URL}/budget`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        base_budget: budget,
                        budget_period: period,
                        custom_days: customDays
                    })
                });

                if (response.ok) {
                    dashboardData.budget = budget;
                    dashboardData.budgetPeriod = period;
                    dashboardData.customDays = customDays;

                    Swal.fire({ icon: 'success', title: 'Success!', text: 'Budget set successfully!', confirmButtonColor: '#2563eb' });
                    fetchDashboardMetrics();
                } else {
                    Swal.fire({ icon: 'error', title: 'Failed', text: 'Failed to update your budget parameters on the engine.' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Network Error', text: 'Server network dropping. Budget update aborted.' });
            }
        }
        function updateBudgetPeriodInfo() {
            const period = dashboardData.budgetPeriod;
            let periodText = '';

            switch (period) {
                case 'monthly':
                    periodText = 'Monthly Budget';
                    break;
                case 'weekly':
                    periodText = 'Weekly Budget';
                    break;
                case 'yearly':
                    periodText = 'Yearly Budget';
                    break;
                case 'custom':
                    periodText = `Custom Budget (${dashboardData.customDays} days)`;
                    break;
                default:
                    periodText = 'Budget';
            }

            budgetPeriodInfo.textContent = periodText;
            
        }

        async function addExpense(e) {
                e.preventDefault();

                const amount = parseInt(document.getElementById('expense-amount').value);
                let category = expenseCategory.value;
                const description = document.getElementById('expense-description').value;

                if (isNaN(amount) || amount <= 0) {
                    Swal.fire({ icon: 'error', title: 'Invalid Amount', text: 'Please enter a valid amount!' });
                    return;
                }

                if (!category) {
                    Swal.fire({ icon: 'warning', title: 'Missing Category', text: 'Please select a category!' });
                    return;
                }

                if (category === 'Other') {
                    category = document.getElementById('other-category').value;
                    if (!category) {
                        Swal.fire({ icon: 'warning', title: 'Specify Category', text: 'Please specify the category name!' });
                        return;
                    }
                }

                const totalExpenses = dashboardData.expenses ? dashboardData.expenses.reduce((sum, exp) => sum + exp.amount, 0) : 0;
                const currentRemaining = dashboardData.budget - totalExpenses;
                let drawdownAmount = 0;
                let vaultMessage = '';
                let isDrawdown = false;

                if (amount > currentRemaining) {
                    const deficit = amount - Math.max(0, currentRemaining);
                    let vaultBalance = parseFloat(localStorage.getItem('globalSavingsVault')) || 0;

                    if (vaultBalance > 0) {
                        if (vaultBalance >= deficit) {
                            vaultBalance -= deficit;
                            drawdownAmount = deficit;
                            vaultMessage = `₹${deficit} has been safely withdrawn from your Savings Vault to cover this expense.`;
                            isDrawdown = true;
                        } else {
                            drawdownAmount = vaultBalance;
                            vaultMessage = `Your Savings Vault was emptied (₹${vaultBalance} withdrawn) to partially cover this expense. You are now in a deficit!`;
                            vaultBalance = 0;
                            isDrawdown = true;
                        }
                        localStorage.setItem('globalSavingsVault', vaultBalance);
                    } else {
                        vaultMessage = `Warning: You have completely overspent your budget and your Savings Vault is empty!`;
                    }
                }

                try {
                    const response = await fetch(`${API_URL}/expenses`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            amount: amount,
                            category: category,
                            description: description
                        })
                    });

                    if (response.ok) {
                        expenseForm.reset();
                        otherCategoryContainer.classList.add('hidden');

                        if (vaultMessage) {
                            Swal.fire({
                                title: isDrawdown ? '🛡️ Reserve Drawdown' : '⚠️ Overbudget Alert',
                                text: vaultMessage,
                                icon: isDrawdown ? 'info' : 'warning',
                                background: '#1a233a',
                                color: '#ffffff',
                                confirmButtonColor: '#2563eb'
                            });
                        }
                        fetchDashboardMetrics();
                    } else {
                        Swal.fire({ icon: 'error', title: 'Save Failed', text: 'Failed to save the new transaction record.' });
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'Server Unreachable', text: 'Server unreachable. Expense was not recorded.' });
                }
            }
            function loadExpenses() {
                const expensesContainer = document.getElementById('expenses-container');
                const expenseListTitle = document.querySelector('#expense-list h3');
                expensesContainer.innerHTML = '';

                if (!dashboardData.expenses || dashboardData.expenses.length === 0) {
                    expensesContainer.innerHTML = '<p>No expenses added yet.</p>';
                    if (expenseListTitle) expenseListTitle.textContent = "Your Expenses";
                    return;
                }

                let displayExpenses = [...dashboardData.expenses].reverse();
                if (selectedCategoryFilter) {
                    displayExpenses = dashboardData.expenses.filter(exp => exp.category === selectedCategoryFilter);

                    if (expenseListTitle) {
                        expenseListTitle.innerHTML = `Expenses for <span style="text-decoration: underline;">${selectedCategoryFilter}</span> <button onclick="resetCategoryFilter()" style="margin-left:10px; font-size:0.75rem; background:rgba(255,255,255,0.2); border:1px solid #fff; color:#fff; cursor:pointer; padding:2px 6px; border-radius:4px;">View All</button>`;
                    }
                } else {
                    if (expenseListTitle) expenseListTitle.textContent = "Your Expenses";
                }

                if (displayExpenses.length === 0) {
                    expensesContainer.innerHTML = `<p>No transactions found for ${selectedCategoryFilter}.</p>`;
                    return;
                }
                const MAX_ITEMS = 50;
                const itemsToRender = displayExpenses.slice(0, MAX_ITEMS);

                itemsToRender.forEach(expense => {
                    const expenseElement = document.createElement('div');
                    expenseElement.className = 'expense-item';
                    expenseElement.innerHTML = `
            <div>
                <strong>${expense.category}</strong>
                <br>
                <small>${expense.description || 'No description'} - ${expense.date || ''}</small>
            </div>
            <div>₹${expense.amount}</div>
        `;
                    expensesContainer.appendChild(expenseElement);
                });
                if (displayExpenses.length > MAX_ITEMS) {
                    const message = document.createElement('div');
                    message.style.textAlign = 'center';
                    message.style.marginTop = '15px';
                    message.style.fontSize = '0.85rem';
                    message.style.opacity = '0.7';
                    message.innerText = `Showing the latest ${MAX_ITEMS} of ${displayExpenses.length} transactions.`;
                    expensesContainer.appendChild(message);
                }
            }
            function resetCategoryFilter() {
                selectedCategoryFilter = null;
                loadExpenses();
            }

       function updateBudgetSummary() {
            const totalExpenses = dashboardData.expenses.reduce((sum, expense) => sum + expense.amount, 0);
            const budgetPercentage = dashboardData.budget > 0 ?
                Math.min(100, (totalExpenses / dashboardData.budget) * 100) : 0;

            document.getElementById('total-expenses').textContent = totalExpenses;
            const safeSavings = dashboardData.savings !== undefined ? dashboardData.savings : Math.max(0, dashboardData.budget - totalExpenses);
            document.getElementById('remaining-budget').textContent = safeSavings;

            const vaultDisplay = document.getElementById('vault-balance');
            if (vaultDisplay) {
                vaultDisplay.textContent = parseFloat(localStorage.getItem('globalSavingsVault')) || 0;
            }

            if (totalExpenses > 0) {
                if (dashboardData.rolloverMessage && dashboardData.rolloverMessage !== "") {
                    progressFill.className = 'progress-fill danger';
                } else {
                    if (budgetPercentage > 80) progressFill.className = 'progress-fill danger';
                    else if (budgetPercentage > 60) progressFill.className = 'progress-fill warning';
                    else progressFill.className = 'progress-fill';
                }

                progressFill.style.display = 'flex';
                progressFill.style.width = `${budgetPercentage}%`;
                progressText.textContent = `${Math.round(budgetPercentage)}%`;
                progressPercentage.textContent = `${Math.round(budgetPercentage)}%`;
            } else {
                progressFill.style.display = 'none';
                progressFill.style.width = '0%';
                progressText.textContent = '';
                progressPercentage.textContent = '0%';
            }
        }
        function toggleOtherCategory() {
            if (expenseCategory.value === 'Other') {
                otherCategoryContainer.classList.remove('hidden');
            } else {
                otherCategoryContainer.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        async function resetBudget() {
                Swal.fire({
                    title: 'Are you sure?',
                    text: "This will clear your current budget, expenses, and start fresh. Your account will remain intact.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#dc3545',
                    cancelButtonColor: '#6c757d',
                    confirmButtonText: 'Yes, reset it!',
                    cancelButtonText: 'Cancel',
                    // Add these to match your background theme
                    background: '#1a233a',
                    color: '#ffffff'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        try {
                            const response = await fetch(`${API_URL}/budget/reset`, {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${token}` }
                            });

                            if (response.ok) {
                                document.getElementById('monthly-budget').value = '';
                                document.getElementById('budget-period').value = 'monthly';
                                document.getElementById('custom-period').value = '';
                                customPeriodContainer.classList.add('hidden');

                                Swal.fire({
                                    icon: 'success',
                                    title: 'Reset Complete',
                                    text: 'Your budget has been reset! Please set a new budget to continue.',
                                    confirmButtonColor: '#2563eb',
                                    background: '#1a233a',
                                    color: '#ffffff'
                                });
                                fetchDashboardMetrics();
                            } else {
                                Swal.fire({ icon: 'error', title: 'Error', text: 'Reset command rejected by engine.', background: '#1a233a', color: '#ffffff' });
                            }
                        } catch (error) {
                            Swal.fire({ icon: 'error', title: 'Error', text: 'Could not issue clear operations right now.', background: '#1a233a', color: '#ffffff' });
                        }
                    }
                });
            }
        function renderExpenseChart() {
            const ctx = document.getElementById('expenseChart');
            const chartWrapper = document.getElementById('chart-wrapper'); // Grab wrapper
            if (!ctx) return;

            if (!dashboardData.expenses || dashboardData.expenses.length === 0) {
                if (chartWrapper) chartWrapper.classList.add('hidden');
                if (expenseChartInstance) {
                    expenseChartInstance.destroy();
                    expenseChartInstance = null;
                }
                return;
            }

            if (chartWrapper) chartWrapper.classList.remove('hidden');

            const categoryTotals = {};
            dashboardData.expenses.forEach(exp => {
                if (categoryTotals[exp.category]) {
                    categoryTotals[exp.category] += exp.amount;
                } else {
                    categoryTotals[exp.category] = exp.amount;
                }
            });

            const labels = Object.keys(categoryTotals);
            const data = Object.values(categoryTotals);

            if (expenseChartInstance) {
                expenseChartInstance.destroy();
            }

            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [
                            '#0d6efd', // Blue
                            '#198754', // Green
                            '#ffc107', // Yellow
                            '#dc3545', // Red
                            '#0dcaf0', // Cyan
                            '#6f42c1', // Purple
                            '#fd7e14'  // Orange
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const clickedElementIndex = elements[0].index;
                            const clickedCategory = labels[clickedElementIndex];
                            if (selectedCategoryFilter === clickedCategory) {
                                selectedCategoryFilter = null;
                            } else {
                                selectedCategoryFilter = clickedCategory;
                            }

                            loadExpenses();
                        } else {
                            selectedCategoryFilter = null;
                            loadExpenses();
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                color: '#ffffff',
                                font: { family: 'system-ui, sans-serif', size: 14, weight: 'bold' }
                            }
                        }
                    }
                }
            });
        }
            async function checkPastSessions() {
                    try {
                        const response = await fetch(`${API_URL}/history`, {
                            method: 'GET',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });

                        if (response.ok) {
                            const data = await response.json();
                            const historyBtn = document.getElementById('history-btn');

                            if (data.total_archived_sessions && data.total_archived_sessions > 0) {
                                historyBtn.style.display = 'block'; 
                            } else {
                                historyBtn.style.display = 'none'; 
                            }
                        }
                    } catch (error) {
                        console.error('Error checking past sessions:', error);
                    }
                }

            async function showPastBudgets() {
                    try {
                        Swal.fire({
                            title: 'Loading History...',
                            allowOutsideClick: false,
                            background: '#1a233a',
                            color: '#ffffff',
                            didOpen: () => { Swal.showLoading(); }
                        });

                        const response = await fetch(`${API_URL}/history`, {
                            method: 'GET',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });

                        const data = await response.json();

                        if (data.sessions && data.sessions.length > 0) {
                            window.allSessionsData = data.sessions;

              let filterHeaderHtml = `
                <div style="display: flex; gap: 10px; margin-bottom: 15px; padding: 0 5px;">
                    <div style="flex: 1; text-align: left;">
                        <label style="font-size: 0.8rem; color: #a0aec0; display: block; margin-bottom: 4px;">Period Cycle</label>
                        <select id="filter-period-type" onchange="window.filterPastSessions()" style="width: 100%; background: #1f293d !important; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff !important; padding: 6px; font-size: 0.85rem; outline: none;">
                            <option value="all" style="background: #1f293d; color: #fff;">All Cycles</option>
                            <option value="monthly" style="background: #1f293d; color: #fff;">Monthly</option>
                            <option value="weekly" style="background: #1f293d; color: #fff;">Weekly</option>
                            <option value="yearly" style="background: #1f293d; color: #fff;">Yearly</option>
                            <option value="custom" style="background: #1f293d; color: #fff;">Custom</option>
                        </select>
                    </div>
                    <div style="flex: 1; text-align: left;">
                        <label style="font-size: 0.8rem; color: #a0aec0; display: block; margin-bottom: 4px;">Timeframe</label>
                        <select id="filter-timeframe" onchange="window.filterPastSessions()" style="width: 100%; background: #1f293d !important; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff !important; padding: 6px; font-size: 0.85rem; outline: none;">
                            <option value="all" style="background: #1f293d; color: #fff;">All Time</option>
                            <option value="30" style="background: #1f293d; color: #fff;">Past 30 Days</option>
                            <option value="90" style="background: #1f293d; color: #fff;">Past 90 Days</option>
                            <option value="365" style="background: #1f293d; color: #fff;">Past Year</option>
                        </select>
                    </div>
                </div>
                <div id="sessions-modal-list" style="text-align: left; max-height: 300px; overflow-y: auto; padding: 5px;"></div>
            `;

                            Swal.fire({
                                title: 'Your Past Budgets',
                                html: filterHeaderHtml,
                                width: '600px',
                                confirmButtonText: 'Close',
                                confirmButtonColor: '#2563eb',
                                background: '#1a233a',
                                color: '#ffffff',
                                didOpen: () => {
                                    window.filterPastSessions();
                                }
                            });
                        } else {
                            Swal.fire({ icon: 'info', title: 'No History', text: 'You do not have any past budgets yet.', background: '#1a233a', color: '#ffffff' });
                        }
                    } catch (error) {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Could not load past budgets.', background: '#1a233a', color: '#ffffff' });
                    }
                }
                    window.showSessionLedger = function (index) {
                        const session = window.allSessionsData[index];
                        if (!session) return;

                        const uniqueCategories = [];
                        if (session.expenses) {
                            session.expenses.forEach(exp => {
                                const cat = exp.category || 'General';
                                if (!uniqueCategories.includes(cat)) {
                                    uniqueCategories.push(cat);
                                }
                            });
                        }

                        const dropdownOptionsHtml = uniqueCategories.map(cat => `
        <option value="${cat}" style="background: #1a233a; color: #fff;">${cat}</option>
    `).join('');

                        let initialRowsHtml = '';
                        if (session.expenses && session.expenses.length > 0) {
                            initialRowsHtml = session.expenses.map(exp => `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 10px; text-align: left;">
                    <span style="background: rgba(56,189,248,0.1); color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">
                        ${exp.category || 'General'}
                    </span>
                </td>
                <td style="padding: 10px; color: #e2e8f0; text-align: left; font-size: 0.85rem;">
                    ${exp.description || '—'}
                </td>
                <td style="padding: 10px; color: #a0aec0; text-align: left; font-size: 0.85rem;">
                    ${exp.date || exp.timestamp || '—'}
                </td>
                <td style="padding: 10px; color: #34d399; text-align: right; font-weight: 600;">
                    ₹${exp.amount}
                </td>
            </tr>
        `).join('');
                        } else {
                            initialRowsHtml = `<tr><td colspan="4" style="padding: 20px; text-align: center; color: #a0aec0;">No items recorded in this session.</td></tr>`;
                        }

                        const overlay = document.createElement('div');
                        overlay.id = 'expense-sub-popup';
                        overlay.style = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); display: flex; justify-content: center; align-items: center; z-index: 999999; font-family: system-ui, -apple-system, sans-serif;';

                        overlay.innerHTML = `
        <div style="background: #1a233a; width: 620px; max-width: 95%; border-radius: 12px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); color: #ffffff;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                <h3 style="margin: 0; font-size: 1.25rem; font-weight: 600; color: #ffffff; letter-spacing: 0.5px;">Expense Breakdown</h3>
                
                <div>
                    <label for="modal-cat-select" style="font-size: 0.8rem; color: #a0aec0; margin-right: 6px;">Filter Category:</label>
                    <select id="modal-cat-select" onchange="window.filterSessionLedgerByCategory(${index}, this.value)" 
                            style="background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 4px 8px; font-size: 0.85rem; outline: none; cursor: pointer;">
                        <option value="all" style="background: #1a233a; color: #fff;">All Categories</option>
                        ${dropdownOptionsHtml}
                    </select>
                </div>
            </div>
            
            <div style="max-height: 280px; overflow-y: auto; margin-bottom: 20px; border-radius: 6px; background: rgba(0,0,0,0.15); padding: 4px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); color: #a0aec0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px;">
                            <th style="padding: 10px; text-align: left;">Category</th>
                            <th style="padding: 10px; text-align: left;">Description</th>
                            <th style="padding: 10px; text-align: left;">Date</th>
                            <th style="padding: 8px; text-align: right;">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="modal-ledger-tbody">
                        ${initialRowsHtml}
                    </tbody>
                </table>
            </div>

           <div style="text-align: center; display: flex; justify-content: center; gap: 12px;">
                <button onclick="window.downloadSessionLedgerCSV(${index})" 
                        style="background: #2563eb; color: #ffffff; border: none; padding: 10px 24px; font-size: 0.9rem; font-weight: 500; border-radius: 6px; cursor: pointer; transition: background 0.2s;"
                        onmouseover="this.style.background='#1d4ed8'" 
                        onmouseout="this.style.background='#2563eb'">
                    Download CSV
                </button>

                <button onclick="document.getElementById('expense-sub-popup').remove()" 
                        style="background: #2563eb; color: #ffffff; border: none; padding: 10px 24px; font-size: 0.9rem; font-weight: 500; border-radius: 6px; cursor: pointer; transition: background 0.2s;"
                        onmouseover="this.style.background='#1d4ed8'" 
                        onmouseout="this.style.background='#2563eb'">
                    Back to History
                </button>
            </div>
    `;

                        document.body.appendChild(overlay);
                    };

                    window.filterSessionLedgerByCategory = function (index, selectedCategory) {
                        const session = window.allSessionsData[index];
                        const tbody = document.getElementById('modal-ledger-tbody');
                        if (!session || !tbody) return;

                        // Filter array based on matching chosen select parameter values
                        const filteredExpenses = session.expenses.filter(exp => {
                            if (selectedCategory === 'all') return true;
                            const currentCat = exp.category || 'General';
                            return currentCat === selectedCategory;
                        });

                        let rowsHtml = '';
                        if (filteredExpenses.length > 0) {
                            rowsHtml = filteredExpenses.map(exp => `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 10px; text-align: left;">
                    <span style="background: rgba(56,189,248,0.1); color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">
                        ${exp.category || 'General'}
                    </span>
                </td>
                <td style="padding: 10px; color: #e2e8f0; text-align: left; font-size: 0.85rem;">
                    ${exp.description || '—'}
                </td>
                <td style="padding: 10px; color: #a0aec0; text-align: left; font-size: 0.85rem;">
                    ${exp.date || exp.timestamp || '—'}
                </td>
                <td style="padding: 10px; color: #34d399; text-align: right; font-weight: 600;">
                    ₹${exp.amount}
                </td>
            </tr>
        `).join('');
                        } else {
                            rowsHtml = `<tr><td colspan="4" style="padding: 20px; text-align: center; color: #a0aec0;">No items found matching this category.</td></tr>`;
                        }

                        tbody.innerHTML = rowsHtml;
                    };
                window.filterPastSessions = function () {
                    const selectedPeriod = document.getElementById('filter-period-type').value;
                    const selectedTimeframe = document.getElementById('filter-timeframe').value;
                    const container = document.getElementById('sessions-modal-list');

                    if (!container || !window.allSessionsData) return;

                    container.innerHTML = '';
                    const now = new Date();

                    const filtered = window.allSessionsData.filter(session => {
                        if (selectedPeriod !== 'all' && session.period_type.toLowerCase() !== selectedPeriod) {
                            return false;
                        }
                        if (selectedTimeframe !== 'all') {
                            const sessionDate = new Date(session.start_date);
                            const daysDifference = (now - sessionDate) / (1000 * 60 * 60 * 24);
                            if (daysDifference > parseInt(selectedTimeframe)) {
                                return false;
                            }
                        }
                        return true;
                    });

                    if (filtered.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #a0aec0; margin-top: 20px; font-size: 0.9em;">No matching session logs found.</p>';
                        return;
                    }
                    filtered.forEach((session,index) => {
                        const isOverBudget = session.total_spent > session.starting_budget;
                        const sessionSavings = session.starting_budget - session.total_spent;
                        const isCurrentActive = !session.end_date || session.end_date === 'Now' || session.end_date.trim() === '';
                        let didCompleteDuration = false;

                        if (!isCurrentActive) {
                            const startDate = new Date(session.start_date);
                            const endDate = new Date(session.end_date);
                            const durationInDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
                            const type = session.period_type.toLowerCase();

                            if (type === 'weekly' && durationInDays >= 6) {
                                didCompleteDuration = true;
                            } else if (type === 'monthly' && durationInDays >= 28) {
                                didCompleteDuration = true;
                            } else if (type === 'yearly' && durationInDays >= 360) {
                                didCompleteDuration = true;
                            }
                        }
                        const showSavings = !isCurrentActive && didCompleteDuration;
                        let tableRowsHtml = '';
                        if (session.expenses && session.expenses.length > 0) {
                            tableRowsHtml = session.expenses.map(exp => `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <td style="padding: 10px; color: #fff; text-align: left;">${exp.title || 'Untitled'}</td>
                    <td style="padding: 10px; text-align: left;"><span style="background: rgba(56,189,248,0.1); color: #38bdf8; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">${exp.category || 'General'}</span></td>
                    <td style="padding: 10px; color: #a0aec0; text-align: left; font-size: 0.85rem;">${exp.description || '—'}</td>
                    <td style="padding: 10px; color: #34d399; text-align: right; font-weight: 600;">₹${exp.amount}</td>
                </tr>
            `).join('');
                        } else {
                            tableRowsHtml = `<tr><td colspan="4" style="padding: 20px; text-align: center; color: #a0aec0;">No items recorded in this session.</td></tr>`;
                        }

                        const popupContentHtml = `
            <div style="max-height: 300px; overflow-y: auto; margin-top: 10px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255,255,255,0.1); color: #a0aec0; font-size: 0.8rem; text-transform: uppercase;">
                            <th style="padding: 8px; text-align: left;">Item</th>
                            <th style="padding: 8px; text-align: left;">Category</th>
                            <th style="padding: 8px; text-align: left;">Description</th>
                            <th style="padding: 8px; text-align: right;">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRowsHtml}
                    </tbody>
                </table>
            </div>
        `;
                       container.innerHTML += `
            <div onclick="window.showSessionLedger(${index})" 
                 style="background: rgba(255, 255, 255, 0.05); padding: 15px; margin-bottom: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; cursor: pointer; transition: background 0.2s;"
                 onmouseover="this.style.background='rgba(255, 255, 255, 0.08)'" 
                 onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <strong style="color: #38bdf8; font-size: 1.05em;">Period: ${session.start_date} to ${session.end_date || 'Now'}</strong>
                    <span style="font-size: 0.72rem; color: #a0aec0; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;">Click to view items</span>
                </div>
                <span style="color: #a0aec0;">Type:</span> ${session.period_type}<br>
                <span style="color: #a0aec0;">Budget:</span> ₹${session.starting_budget}<br>
                <span style="color: #a0aec0;">Spent:</span> <strong style="color: ${isOverBudget ? '#f87171' : '#34d399'};">₹${session.total_spent}</strong><br>
                ${showSavings ? `
                    <span style="color: #a0aec0;">Saved:</span> <strong style="color: ${sessionSavings >= 0 ? '#10b981' : '#f87171'};">₹${sessionSavings >= 0 ? sessionSavings : 0}</strong><br>
                ` : ''}
                <small style="color: #718096; display: block; margin-top: 4px;"><em>${session.expenses.length} expenses recorded</em></small>
            </div>
        `;
                    });
                };
                window.downloadSessionLedgerCSV = function (index) {
                        const session = window.allSessionsData[index];
                        if (!session || !session.expenses || session.expenses.length === 0) {
                            Swal.fire('Empty Ledger', 'No expenses available to download.', 'warning');
                            return;
                        }

                        let csvRows = ["Category,Description,Date,Amount"];

                        session.expenses.forEach(exp => {
                            const category = `"${(exp.category || 'General').replace(/"/g, '""')}"`;
                            const description = `"${(exp.description || '—').replace(/"/g, '""')}"`;

                            let rawDate = exp.date || exp.timestamp || '—';
                            let formattedDate = rawDate;

                            if (rawDate !== '—' && rawDate.includes('-')) {
                                // Split the YYYY-MM-DD string
                                const parts = rawDate.split(' ')[0].split('-');
                                if (parts.length === 3 && parts[0].length === 4) {
                                    const year = parts[0];
                                    const month = parts[1];
                                    const day = parts[2];
                                    formattedDate = `${day}-${month}-${year}`; 
                                }
                            }

                            const date = `=" ${formattedDate}"`;
                            const amount = exp.amount || 0;

                            csvRows.push(`${category},${description},${date},${amount}`);
                        });

                        const csvString = csvRows.join("\n");

                        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvString], { type: "text/csv;charset=utf-8;" });

                        const link = document.createElement("a");
                        if (navigator.msSaveBlob) {
                            navigator.msSaveBlob(blob, `Expense_Breakdown_${session.start_date}.csv`);
                        } else {
                            const url = URL.createObjectURL(blob);
                            link.setAttribute("href", url);
                            link.setAttribute("download", `Expense_Breakdown_${session.start_date}_to_${session.end_date || 'Now'}.csv`);
                            link.style.visibility = 'hidden';
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        }
                    };
                    window.checkBudgetExpiration = function () {
                            const activeBudget = JSON.parse(localStorage.getItem('currentBudget'));

                            if (!activeBudget || !activeBudget.end_date) return;

                            const today = new Date();
                            today.setHours(0, 0, 0, 0);

                            const endDate = new Date(activeBudget.end_date);
                            endDate.setHours(0, 0, 0, 0);

                            if (today > endDate) {
                                triggerAutoReset(activeBudget);
                            }
                        };

                        window.triggerAutoReset = function (activeBudget) {
                                const totalSpent = activeBudget.expenses ? activeBudget.expenses.reduce((sum, exp) => sum + exp.amount, 0) : 0;
                                const savedAmount = activeBudget.starting_budget - totalSpent;
                                let vaultMessage = '';

                                if (savedAmount > 0) {
                                    let currentVault = parseFloat(localStorage.getItem('globalSavingsVault')) || 0;
                                    currentVault += savedAmount;
                                    localStorage.setItem('globalSavingsVault', currentVault);
                                    vaultMessage = `<br><br><span style="color:#10b981; font-weight:bold;">Great job! You saved ₹${savedAmount} this cycle. It has been added to your Savings Vault.</span>`;
                                } else if (savedAmount < 0) {
                                    vaultMessage = `<br><br><span style="color:#f87171; font-weight:bold;">You overspent by ₹${Math.abs(savedAmount)} this cycle.</span>`;
                                }

                                Swal.fire({
                                    title: 'Budget Session Ended',
                                    html: `Your allotted time for this budget has passed. The session has been securely saved to your history.${vaultMessage}`,
                                    icon: 'info',
                                    background: '#1a233a',
                                    color: '#ffffff',
                                    confirmButtonColor: '#2563eb',
                                    confirmButtonText: 'Set New Budget',
                                    allowOutsideClick: false
                                }).then(async (result) => { // <-- Note the 'async' here!
                                    if (result.isConfirmed) {
                                        try {
                                            await fetch(`${API_URL}/budget/reset`, {
                                                method: 'POST',
                                                headers: { 'Authorization': `Bearer ${token}` }
                                            });
                                        } catch (error) {
                                            console.error('Backend reset sync failed:', error);
                                        }
                                        localStorage.removeItem('currentBudget');
                                        location.reload();
                                    }
                                });
                            };
    </script>
</body>

</html>
