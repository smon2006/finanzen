<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FINANZEN</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <div class="form-container">
        <h2 class="form-title">Login to Your Account</h2>
        <form id="login-form">
            <div id="auth-alert" class="api-message error hidden"></div>
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="form-group" style="margin-bottom: 5px;">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="Enter your password"
                    required>
            </div>

            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <input type="checkbox" id="show-password" style="width: auto; cursor: pointer; margin: 0;">
                <label for="show-password"
                    style="font-weight: normal; font-size: 0.85rem; cursor: pointer; color: #555; margin: 0;">
                    Show password
                </label>
            </div>

            <button type="submit" class="submit-btn">Login</button>
            <div class="form-link">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
                const token = localStorage.getItem('finanzenToken');
                const currentUser = localStorage.getItem('finanzenCurrentUser');

                if (token && currentUser) {
                    window.location.href = 'dashboard.html';
                }
            });
        const showPassword = document.getElementById('show-password');
        const passwordInput = document.getElementById('login-password');

        showPassword.addEventListener('change', function () {
            passwordInput.setAttribute('type', this.checked ? 'text' : 'password');
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const alertBox = document.getElementById('auth-alert');
            const submitBtn = document.querySelector('.submit-btn');
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';
            alertBox.classList.add('hidden');

            try {
                const response = await fetch('https://finanzen-backend-5pqy.onrender.com/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('finanzenToken', data.access_token);
                    localStorage.setItem('finanzenCurrentUser', username);

                    alertBox.textContent = 'Login successful! Redirecting...';
                    alertBox.className = 'api-message success';
                    alertBox.classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    alertBox.textContent = data.detail || 'Invalid username or password.';
                    alertBox.className = 'api-message error';
                    alertBox.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }

            } catch (error) {
                if (!navigator.onLine || error.message?.includes('Network Error')) {
                    alertBox.textContent = 'Network connection lost. Please check your internet and try again.';
                } else {
                    alertBox.textContent = 'Unable to connect to the server. Please try again later.';
                }
                alertBox.className = 'api-message error';
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>

</html>
