<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FINANZEN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a233a">
</head>

<body class="login-page">
    <div class="form-container">
        <h2 class="form-title">Create Your Account</h2>
        <form id="signup-form">
            <div id="auth-alert" class="api-message error hidden"></div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Create your username" required
                    pattern="^[a-zA-Z0-9]{5,15}$"
                    title="Username must be 5-15 characters long and contain only letters and numbers.">
            </div>

            <div class="form-group" style="margin-bottom: 5px;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create your password" required
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                    title="Password must be at least 8 characters long, including an uppercase letter, a lowercase letter, a number, and a special character (@$!%*?&).">
            </div>

            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <input type="checkbox" id="show-password" style="width: auto; cursor: pointer; margin: 0;">
                <label for="show-password"
                    style="font-weight: normal; font-size: 0.85rem; cursor: pointer; color: #555; margin: 0;">Show
                    password</label>
            </div>

            <div class="form-group" style="margin-bottom: 5px;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password"
                    required>
            </div>

            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 25px;">
                <input type="checkbox" id="show-confirm-password" style="width: auto; cursor: pointer; margin: 0;">
                <label for="show-confirm-password"
                    style="font-weight: normal; font-size: 0.85rem; cursor: pointer; color: #555; margin: 0;">Show
                    confirm password</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
            <div class="form-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
                if (localStorage.getItem('finanzenToken') && localStorage.getItem('finanzenCurrentUser')) {
                    window.location.href = 'dashboard.html';
                }
            });
        const showPassword = document.getElementById('show-password');
        const passwordInput = document.getElementById('password');

        showPassword.addEventListener('change', function () {
            passwordInput.setAttribute('type', this.checked ? 'text' : 'password');
        });

        const showConfirmPassword = document.getElementById('show-confirm-password');
        const confirmPasswordInput = document.getElementById('confirm-password');

        showConfirmPassword.addEventListener('change', function () {
            confirmPasswordInput.setAttribute('type', this.checked ? 'text' : 'password');
        });
        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const alertBox = document.getElementById('auth-alert');
            const submitBtn = document.querySelector('.submit-btn');

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alertBox.textContent = 'Passwords do not match!';
                alertBox.className = 'api-message error';
                alertBox.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            alertBox.classList.add('hidden');

            try {
                const response = await fetch('https://finanzen-backend-5pqy.onrender.com/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('finanzenToken', data.access_token);
                    localStorage.setItem('finanzenCurrentUser', username);

                    alertBox.textContent = 'Account created successfully! Redirecting...';
                    alertBox.className = 'api-message success';
                    alertBox.classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    let errorMessage = 'Registration failed.';

                    if (data.detail) {
                        if (Array.isArray(data.detail)) {
                            errorMessage = data.detail.map(err => `${err.loc[1] || 'Field'}: ${err.msg}`).join(' | ');
                        } else {
                            errorMessage = data.detail;
                        }
                    }

                    alertBox.textContent = errorMessage;
                    alertBox.className = 'api-message error';
                    alertBox.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }

            } catch (error) {
                if (!navigator.onLine || error.message?.includes('Network Error')) {
                    alertBox.textContent = 'Network connection lost. Please check your internet and try again.';
                } else {
                    alertBox.textContent = 'Unable to connect to the server. Please try again later.';
                }
                alertBox.className = 'api-message error';
                alertBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
        if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('Service Worker Registered!'))
                        .catch(err => console.error('Service Worker Registration Failed:', err));
                });
            }
    </script>
</body>

</html>
